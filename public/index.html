<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRM – Powered by Everything Shul</title>
<link rel="icon" href="/img/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Hebrew:wght@400;500;700&family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>

<!-- Setup -->
<div id="setup-screen" class="full-screen" style="display:none">
  <div class="auth-card">
    <img src="/img/logo.png" class="auth-logo" alt="DRM">
    <h1>DRM Setup</h1>
    <p class="sub">Create your admin account to get started</p>
    <form id="setup-form">
      <label>Full Name</label>
      <input id="s-name" type="text" placeholder="Your name" required>
      <label>Email</label>
      <input id="s-email" type="email" placeholder="admin@example.com" required>
      <label>Password</label>
      <input id="s-pass" type="password" placeholder="Choose a password" required>
      <label>Organization Name</label>
      <input id="s-org" type="text" placeholder="My Synagogue" required>
      <button type="submit" class="btn btn-primary w-full mt">Create Account</button>
    </form>
    <p id="setup-err" class="err" style="display:none"></p>
  </div>
</div>

<!-- Login -->
<div id="login-screen" class="full-screen" style="display:none">
  <div class="auth-card">
    <img src="/img/logo.png" class="auth-logo" alt="DRM">
    <h1>DRM</h1>
    <p class="sub">Donor Relationship Manager</p>
    <p class="powered">powered by <strong>Everything Shul</strong></p>
    <form id="login-form">
      <label>Email</label>
      <input id="l-email" type="email" autocomplete="email" required>
      <label>Password</label>
      <input id="l-pass" type="password" autocomplete="current-password" required>
      <button type="submit" class="btn btn-primary w-full mt">Sign In</button>
    </form>
    <p id="login-err" class="err" style="display:none"></p>
  </div>
</div>

<!-- New Account (invite link) -->
<div id="newacct-screen" class="full-screen" style="display:none">
  <div class="auth-card">
    <img src="/img/logo.png" class="auth-logo" alt="DRM">
    <h1>Create Your Account</h1>
    <p class="sub">Set up your organization on DRM</p>
    <form id="newacct-form">
      <label>Your Full Name</label>
      <input id="na-name" type="text" required>
      <label>Organization Name</label>
      <input id="na-org" type="text" required>
      <label>Password</label>
      <input id="na-pass" type="password" required>
      <label>Confirm Password</label>
      <input id="na-pass2" type="password" required>
      <button type="submit" class="btn btn-primary w-full mt">Create Account</button>
    </form>
    <p id="newacct-err" class="err" style="display:none"></p>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Mobile header -->
  <div id="mobile-header" class="mobile-header">
    <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()">&#9776;</button>
    <span class="mobile-title">DRM</span>
    <span style="width:36px"></span>
  </div>

  <!-- Overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">
        <img src="/img/logo.png" id="sb-logo-img" alt="">
        <span class="sb-title">DRM</span>
      </div>
      <button class="sb-collapse" id="collapse-btn" onclick="toggleSidebar()" title="Collapse">&#9776;</button>
    </div>

    <div class="sb-org">
      <select id="org-select"></select>
    </div>

    <nav id="sidebar-nav">
      <a class="nav-item active" data-page="dashboard">
        <span class="ni">&#9783;</span><span class="nl">Dashboard</span>
      </a>
      <a class="nav-item" data-page="donors">
        <span class="ni">&#128101;</span><span class="nl">Donors</span>
      </a>
      <a class="nav-item" data-page="donations">
        <span class="ni">&#36;</span><span class="nl">Donations</span>
      </a>
      <a class="nav-item" data-page="verification">
        <span class="ni">&#10003;</span><span class="nl">Info Check</span>
        <span id="verify-badge" class="nbadge" style="display:none"></span>
      </a>
      <a class="nav-item" data-page="failures">
        <span class="ni">!</span><span class="nl">Failed Charges</span>
        <span id="fail-badge" class="nbadge red" style="display:none"></span>
      </a>
      <a class="nav-item" data-page="bank">
        <span class="ni">&#127968;</span><span class="nl">Bank</span>
      </a>
      <a class="nav-item" data-page="whatsapp">
        <span class="ni">💬</span><span class="nl">WhatsApp</span>
      </a>
      <a class="nav-item" data-page="emails">
        <span class="ni">&#9993;</span><span class="nl">Emails</span>
      </a>
      <a class="nav-item" data-page="kvitel">
        <span class="ni">&#128196;</span><span class="nl">Kvitel</span>
      </a>
      <a class="nav-item" data-page="reports">
        <span class="ni">&#128202;</span><span class="nl">Reports</span>
      </a>
      <a class="nav-item" data-page="settings">
        <span class="ni">&#9881;</span><span class="nl">Settings</span>
      </a>
    </nav>

    <div class="sb-footer">
      <span id="sb-user" class="sb-user-name"></span>
      <button id="logout-btn" class="btn-link">Sign Out</button>
    </div>
  </aside>

  <!-- Content -->
  <main id="main-content">
    <div id="page-dashboard"    class="page active"></div>
    <div id="page-donors"       class="page"></div>
    <div id="page-donations"    class="page"></div>
    <div id="page-verification" class="page"></div>
    <div id="page-failures"     class="page"></div>
    <div id="page-bank"         class="page"></div>
    <div id="page-emails"       class="page"></div>
    <div id="page-kvitel"       class="page"></div>
    <div id="page-reports"      class="page"></div>
    <div id="page-settings"     class="page"></div>
  </main>
</div>

<!-- Modal -->
<div id="modal-overlay" style="display:none" class="modal-overlay" onclick="if(event.target===this)Modal.close()">
  <div id="modal-box" class="modal-box">
    <div class="modal-hdr">
      <h2 id="modal-title"></h2>
      <button onclick="Modal.close()" class="btn-icon">&#10005;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast-wrap"></div>

<script src="/js/drm.js"></script>
</body>
</html>
