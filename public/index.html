<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRM – Powered by Everything Shul</title>
<link rel="icon" href="/img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Hebrew:wght@300;400;500;700&family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen" class="full-screen" style="display:none">
  <div class="auth-card">
    <img src="/img/logo.png" alt="Everything Shul" class="auth-logo">
    <h1>DRM Setup</h1>
    <p class="subtitle">Create your admin account to get started</p>
    <form id="setup-form">
      <label>Full Name</label>
      <input type="text" id="setup-name" placeholder="Your full name" required>
      <label>Email</label>
      <input type="email" id="setup-email" placeholder="admin@example.com" required>
      <label>Password</label>
      <input type="password" id="setup-password" placeholder="Choose a strong password" required>
      <label>Organization Name</label>
      <input type="text" id="setup-org" placeholder="My Synagogue" required>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:20px">Create Admin Account</button>
    </form>
    <p id="setup-error" class="error-msg" style="display:none;margin-top:10px"></p>
  </div>
</div>

<!-- Login Screen -->
<div id="login-screen" class="full-screen" style="display:none">
  <div class="auth-card">
    <img src="/img/logo.png" alt="Everything Shul" class="auth-logo">
    <h1>DRM</h1>
    <p class="subtitle">Donor Relationship Manager</p>
    <p class="powered">powered by <strong>Everything Shul</strong></p>
    <form id="login-form">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" required autocomplete="email">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:20px">Sign In</button>
    </form>
    <p id="login-error" class="error-msg" style="display:none;margin-top:10px"></p>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar-expanded">
    <div class="sidebar-top">
      <div class="sidebar-logo">
        <img src="/img/logo.png" alt="DRM" id="sidebar-logo-img">
        <span class="sidebar-logo-text">DRM</span>
      </div>
      <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Collapse sidebar">&#9776;</button>
    </div>

    <!-- Org Switcher -->
    <div class="org-switcher" id="org-switcher-wrap">
      <select id="org-select"></select>
      <button id="add-org-btn" class="btn-icon sidebar-icon-btn" title="New Organization">+</button>
    </div>

    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="#donors" class="nav-item" data-page="donors">
        <span class="nav-icon">👥</span><span class="nav-label">Donors</span>
      </a>
      <a href="#donations" class="nav-item" data-page="donations">
        <span class="nav-icon">💳</span><span class="nav-label">Donations</span>
      </a>
      <a href="#verification" class="nav-item" data-page="verification">
        <span class="nav-icon">✅</span><span class="nav-label">Info Check</span>
        <span id="verify-badge" class="badge" style="display:none"></span>
      </a>
      <a href="#failures" class="nav-item" data-page="failures">
        <span class="nav-icon">❌</span><span class="nav-label">Failed Charges</span>
        <span id="fail-badge" class="badge red" style="display:none"></span>
      </a>
      <a href="#bank" class="nav-item" data-page="bank">
        <span class="nav-icon">🏦</span><span class="nav-label">Bank</span>
      </a>
      <a href="#emails" class="nav-item" data-page="emails">
        <span class="nav-icon">📧</span><span class="nav-label">Emails</span>
      </a>
      <a href="#kvitel" class="nav-item" data-page="kvitel">
        <span class="nav-icon">📜</span><span class="nav-label">Kvitel</span>
      </a>
      <a href="#reports" class="nav-item" data-page="reports">
        <span class="nav-icon">📈</span><span class="nav-label">Reports</span>
      </a>
      <a href="#settings" class="nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <span id="user-name-display" class="nav-label"></span>
        <button id="logout-btn" class="btn-link nav-label">Sign Out</button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="main-content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-donors" class="page"></div>
    <div id="page-donations" class="page"></div>
    <div id="page-verification" class="page"></div>
    <div id="page-failures" class="page"></div>
    <div id="page-bank" class="page"></div>
    <div id="page-emails" class="page"></div>
    <div id="page-kvitel" class="page"></div>
    <div id="page-reports" class="page"></div>
    <div id="page-settings" class="page"></div>
  </main>
</div>

<!-- Global Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div id="modal-box" class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button id="modal-close" class="btn-icon">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/donors.js"></script>
<script src="/js/pages/donor-detail.js"></script>
<script src="/js/pages/all-pages.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
