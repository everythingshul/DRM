services:
  - type: web
    name: drm-everything-shul
    env: node
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: drm-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: APP_URL
        sync: false
